name: Build and Push Minecraft Image to ECR

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: minecraft-server

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure AWS credentials (AWS Academy)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Ensure ECR repo exists (prevents silent failures)
      - name: Create ECR repository if missing
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
          aws ecr create-repository --repository-name $ECR_REPOSITORY

      # 5. Set image tag (safe fallback)
      - name: Define image tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      # 6. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      # 7. Smoke test container
      - name: Smoke test container
        run: |
          docker run -d --name test -p 25565:25565 $ECR_REPOSITORY:$IMAGE_TAG
          sleep 30
          docker logs test || true
          docker stop test

      # 8. Tag and push to ECR
      - name: Tag and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Always ensure latest exists
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # If this is a version tag, also push that
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          if [[ "$IMAGE_TAG" != "latest" ]]; then
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          fi