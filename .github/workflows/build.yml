name: Build and Push Minecraft Image to ECR

on:
  push:
    tags:
      - "v*"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: minecraft-server

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure AWS credentials (AWS Academy)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.ref_name }} .

      # 5. Smoke test (required by rubric)
      - name: Smoke test container
        run: |
          docker run -d --name test -p 25565:25565 $ECR_REPOSITORY:${{ github.ref_name }}
          sleep 30

          docker logs test || true

          docker stop test

      # 6. Tag and push to ECR (IMPORTANT FIX)
      - name: Tag and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE=${{ github.ref_name }}

          # Tag versioned image
          docker tag $ECR_REPOSITORY:$IMAGE \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE

          # ALSO tag as latest (THIS FIXES YOUR ANSIBLE ERROR)
          docker tag $ECR_REPOSITORY:$IMAGE \
            $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Push both tags
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest